services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qtov
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qtov"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/qtov
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CLASSIFIER_MODELS: ${CLASSIFIER_MODELS:-}
      SUMMARIZER_MODELS: ${SUMMARIZER_MODELS:-}
      CLINICALTRIALS_BASE_URL: https://clinicaltrials.gov/api/v2/studies
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      LOG_JSON: ${LOG_JSON:-true}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
